name: Deploy to GitHub Pages & HK Server

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # Build for GitHub Pages (with base-href, local canvaskit)
      - run: flutter build web --base-href "/bridgeread/" --no-web-resources-cdn

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          force_orphan: true

      # Build for HK server (no base-href, local canvaskit — gstatic.com blocked in China)
      - run: flutter build web --no-web-resources-cdn

      # Pre-compress large files for nginx gzip_static
      - name: Pre-compress assets
        run: |
          cd build/web
          find . -type f \( -name "*.js" -o -name "*.json" -o -name "*.wasm" -o -name "*.css" -o -name "*.html" -o -name "*.map" \) | while read f; do
            gzip -9 -k "$f"
          done

      # Deploy to HK server — single tar with everything
      - name: Deploy to HK Server
        env:
          SSH_KEY: ${{ secrets.HK_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/hk_key
          chmod 600 ~/.ssh/hk_key
          ssh-keyscan -H 47.243.220.248 >> ~/.ssh/known_hosts 2>/dev/null

          # Flutter build already includes all assets in build/web/assets/
          # No need for separate CDN asset deployment
          tar czf /tmp/web.tar.gz -C build/web .
          scp -i ~/.ssh/hk_key /tmp/web.tar.gz root@47.243.220.248:/tmp/
          ssh -i ~/.ssh/hk_key root@47.243.220.248 'cd /var/www/bridgeread && rm -rf * && tar xzf /tmp/web.tar.gz && rm /tmp/web.tar.gz'

          # Sync nginx config (convert CRLF to LF) and reload
          sed 's/\r$//' deploy/nginx-bridgeread.conf > /tmp/nginx-bridgeread.conf
          scp -i ~/.ssh/hk_key /tmp/nginx-bridgeread.conf root@47.243.220.248:/etc/nginx/sites-enabled/bridgeread
          ssh -i ~/.ssh/hk_key root@47.243.220.248 'nginx -t && systemctl reload nginx'
