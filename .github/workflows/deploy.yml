name: Build & Deploy

on:
  push:
    branches: [production]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Build for China server (no base-href, HTML renderer, no canvaskit WASM)
      - run: flutter build web 
      # Pre-compress large files for nginx gzip_static
      - name: Pre-compress assets
        run: |
          cd build/web
          find . -type f \( -name "*.js" -o -name "*.json" -o -name "*.css" -o -name "*.html" -o -name "*.map" \) | while read f; do
            gzip -9 -k "$f"
          done

      # Sync production branch to Gitee (orphan push — no history, fast)
      - name: Push production to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          tmpdir=$(mktemp -d)
          cp -r . "$tmpdir/" 2>/dev/null || true
          cd "$tmpdir"
          rm -rf .git
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Production $(date -u +%Y%m%d-%H%M%S)"
          git push --force https://oauth2:${GITEE_TOKEN}@gitee.com/Yejiaomin_e351/bridge-read.git HEAD:production
          rm -rf "$tmpdir"

      # Push build output to Gitee deploy branch (China server auto-pulls via cron)
      - name: Push to Gitee deploy branch
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd build/web
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy $(date -u +%Y%m%d-%H%M%S)"
          git push --force https://oauth2:${GITEE_TOKEN}@gitee.com/Yejiaomin_e351/bridge-read.git HEAD:deploy

      # Build for GitHub Pages (with base-href)
      - run: flutter build web --base-href "/bridgeread/" 
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          force_orphan: true
