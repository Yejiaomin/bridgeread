name: Build & Deploy

on:
  push:
    branches: [production]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Build for China server (no base-href, HTML renderer, no canvaskit WASM)
      - run: flutter build web 
      # Pre-compress large files for nginx gzip_static
      - name: Pre-compress assets
        run: |
          cd build/web
          find . -type f \( -name "*.js" -o -name "*.json" -o -name "*.css" -o -name "*.html" -o -name "*.map" \) | while read f; do
            gzip -9 -k "$f"
          done

      # Sync backend code to Gitee (only server/ and deploy/ — small and fast)
      - name: Push backend to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          tmpdir=$(mktemp -d)
          cp -r server "$tmpdir/server"
          cp -r deploy "$tmpdir/deploy" 2>/dev/null || true
          cp package*.json "$tmpdir/" 2>/dev/null || true
          cd "$tmpdir"
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Backend $(date -u +%Y%m%d-%H%M%S)"
          git push --force https://oauth2:${GITEE_TOKEN}@gitee.com/Yejiaomin_e351/bridge-read.git HEAD:production

      # Push build output to Gitee deploy branch (incremental — only sends changed files)
      - name: Push to Gitee deploy branch
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          GITEE_URL="https://oauth2:${GITEE_TOKEN}@gitee.com/Yejiaomin_e351/bridge-read.git"
          tmpdir=$(mktemp -d)
          # Try to clone existing deploy branch for incremental push
          if git clone --depth 1 --branch deploy "$GITEE_URL" "$tmpdir" 2>/dev/null; then
            # Remove old files, copy new build
            find "$tmpdir" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
            cp -r build/web/* "$tmpdir/"
            cd "$tmpdir"
          else
            # First time: no deploy branch yet, create fresh
            cp -r build/web/* "$tmpdir/"
            cd "$tmpdir"
            git init
            git remote add origin "$GITEE_URL"
          fi
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy $(date -u +%Y%m%d-%H%M%S)" || true
          git push --force origin HEAD:deploy

      # Build for GitHub Pages (with base-href)
      - run: flutter build web --base-href "/bridgeread/" 
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          force_orphan: true
