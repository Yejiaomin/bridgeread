name: Deploy to GitHub Pages & HK Server

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # Build for GitHub Pages (with base-href, local canvaskit)
      - run: flutter build web --base-href "/bridgeread/" --no-web-resources-cdn

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web

      # Strip large assets from pubspec before production build
      - name: Strip large assets for production build
        run: |
          python3 -c "
          lines = open('pubspec.yaml').readlines()
          out = []
          skip = False
          for line in lines:
              if '# Large assets below' in line:
                  skip = True
                  continue
              if skip and line.strip().startswith('- assets/'):
                  continue
              if skip and not line.strip().startswith('- assets/') and not line.strip().startswith('#'):
                  skip = False
              out.append(line)
          open('pubspec.yaml','w').writelines(out)
          "

      # Build for HK server (no base-href, local canvaskit — gstatic.com blocked in China)
      - run: flutter build web --no-web-resources-cdn

      # Deploy to HK server — app bundle + CDN assets separately
      - name: Deploy to HK Server
        env:
          SSH_KEY: ${{ secrets.HK_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/hk_key
          chmod 600 ~/.ssh/hk_key
          ssh-keyscan -H 47.243.220.248 >> ~/.ssh/known_hosts 2>/dev/null

          # 1. Deploy Flutter web build (small, ~36MB)
          tar czf /tmp/web.tar.gz -C build/web .
          scp -i ~/.ssh/hk_key /tmp/web.tar.gz root@47.243.220.248:/tmp/
          ssh -i ~/.ssh/hk_key root@47.243.220.248 'cd /var/www/bridgeread && rm -rf * && tar xzf /tmp/web.tar.gz'

          # 2. Deploy CDN assets (books, audio, images — loaded on demand)
          tar czf /tmp/cdn_assets.tar.gz \
            assets/books/ \
            assets/audio/ \
            assets/characters/ \
            assets/pet/ \
            assets/shop/ \
            assets/phonics/ \
            assets/quiz/ \
            assets/home/ \
            assets/video/
          scp -i ~/.ssh/hk_key /tmp/cdn_assets.tar.gz root@47.243.220.248:/tmp/
          ssh -i ~/.ssh/hk_key root@47.243.220.248 'cd /var/www/bridgeread && tar xzf /tmp/cdn_assets.tar.gz'
