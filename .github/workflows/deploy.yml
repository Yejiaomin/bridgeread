name: Build & Deploy

on:
  push:
    branches: [production]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # Build for GitHub Pages (with base-href, local canvaskit)
      - run: flutter build web --base-href "/bridgeread/" --no-web-resources-cdn

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          force_orphan: true

      # Build for China server (no base-href, local canvaskit)
      - run: flutter build web --no-web-resources-cdn

      # Pre-compress large files for nginx gzip_static
      - name: Pre-compress assets
        run: |
          cd build/web
          find . -type f \( -name "*.js" -o -name "*.json" -o -name "*.wasm" -o -name "*.css" -o -name "*.html" -o -name "*.map" \) | while read f; do
            gzip -9 -k "$f"
          done

      # Push build output to Gitee deploy branch (China server pulls from here)
      - name: Push to Gitee deploy branch
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          cd build/web
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Deploy $(date -u +%Y%m%d-%H%M%S)"
          git push --force https://oauth2:${GITEE_TOKEN}@gitee.com/Yejiaomin_e351/bridge-read.git HEAD:deploy

      # SSH to China server and pull latest build
      - name: Deploy to China server
        uses: appleboy/ssh-action@v1
        with:
          host: 120.79.16.89
          username: admin
          key: ${{ secrets.CN_SSH_KEY }}
          script: |
            cd /tmp
            rm -rf web-deploy
            git clone -b deploy --depth 1 https://gitee.com/Yejiaomin_e351/bridge-read.git web-deploy
            sudo rm -rf /var/www/bridgeread/*
            sudo cp -r web-deploy/* /var/www/bridgeread/
            rm -rf web-deploy
            echo "Frontend deployed successfully"
