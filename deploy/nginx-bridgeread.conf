server {
    listen 80;
    server_name bridgeread.cc www.bridgeread.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bridgeread.cc www.bridgeread.cc;
    root /var/www/bridgeread;
    index index.html;
    ssl_certificate /etc/letsencrypt/live/bridgeread.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bridgeread.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /gfonts/ {
        resolver 8.8.8.8 valid=300s;
        rewrite ^/gfonts/(.*)$ /s/$1 break;
        proxy_pass https://fonts.gstatic.com;
        proxy_ssl_server_name on;
        proxy_set_header Host fonts.gstatic.com;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* ^/(main\.dart\.js|flutter_bootstrap\.js|flutter\.js|flutter_service_worker\.js|version\.json|manifest\.json|AssetManifest.*\.json)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(wasm|png|jpg|jpeg|gif|ico|svg|mp3|mp4|wav|ttf|otf|woff|woff2|css)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    gzip_static on;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript text/xml application/json application/javascript application/xml application/wasm application/octet-stream image/svg+xml font/woff2;
}
