<!DOCTYPE html>
<html>
<head>
  <base href="/bridgeread/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BridgeRead - 儿童英语绘本阅读">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BridgeRead">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BridgeRead</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload critical resources -->
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="flutter.js" as="script">

  <!-- Loading screen style -->
  <style>
    body { margin: 0; background: #FFF8F0; }
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #FFF8F0;
      font-family: -apple-system, sans-serif;
    }
    #loading .spinner {
      width: 48px; height: 48px;
      border: 4px solid #FFE0C0;
      border-top-color: #FF8C42;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading p { color: #FF8C42; margin-top: 16px; font-size: 16px; }
    #loading .pwa-tip {
      color: #999; font-size: 13px; margin-top: 24px; text-align: center;
      line-height: 1.6; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading indicator while Flutter initializes -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
    <p class="pwa-tip" id="pwaTip">
      Tip: 点击浏览器右上角 "添加到主屏幕"<br>下次可以直接从桌面打开哦
    </p>
  </div>
  <script>
    // Only show PWA tip when opened in browser (not standalone/installed)
    if (!window.matchMedia('(display-mode: standalone)').matches &&
        !window.navigator.standalone) {
      var tip = document.getElementById('pwaTip');
      if (tip) tip.style.display = 'block';
    }
  </script>

  <script>
    // Remove loading screen once Flutter renders first frame
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });

    // Auto-update: when a new service worker is available, activate it immediately
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var reg of registrations) {
          reg.update();
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'activated') {
                  window.location.reload();
                }
              });
            }
          });
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
