<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BridgeRead - 儿童英语绘本阅读">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BridgeRead">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BridgeRead</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload critical resources -->
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="flutter.js" as="script">

  <!-- Loading screen style -->
  <style>
    body { margin: 0; background: linear-gradient(135deg, #FFE8D6, #FFCBA4, #FFAD7A); }
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #FFE8D6, #FFCBA4, #FFAD7A);
      font-family: -apple-system, 'PingFang SC', sans-serif;
    }
    /* Decorative circles */
    #loading::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
    }
    #loading::after {
      content: ''; position: absolute; bottom: 60px; left: -30px;
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,0.13);
    }
    /* Speech bubble */
    .bubble {
      background: white; border-radius: 24px;
      padding: 16px 24px; text-align: center;
      box-shadow: 0 4px 12px rgba(255,140,66,0.25);
      position: relative; margin-bottom: 8px;
      animation: bubbleBounce 2s ease-in-out infinite;
    }
    .bubble::after {
      content: ''; position: absolute; bottom: -10px; left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid white;
    }
    .bubble-text { color: #FF6B35; font-weight: 800; font-size: 20px; line-height: 1.5; }
    .bubble-text .countdown { font-size: 28px; font-weight: 900; }
    @keyframes bubbleBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    /* Eggy image */
    .eggy-img {
      width: 420px; height: 420px; object-fit: contain;
      animation: eggyBreath 3s ease-in-out infinite;
    }
    @keyframes eggyBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    /* Title */
    .loading-title {
      font-size: 36px; font-weight: 900; color: #B84A00;
      letter-spacing: 1.5px; margin-top: 12px;
    }
    .loading-subtitle {
      font-size: 16px; color: #CC6622; font-weight: 600; margin-top: 4px; text-align: center;
    }
    /* PWA tip */
    .pwa-tip {
      color: #999; font-size: 13px; margin-top: 32px; text-align: center;
      line-height: 1.6; display: none;
    }
  </style>
</head>
<body>
  <!-- Loading screen: Eggy + countdown bubble -->
  <div id="loading">
    <div class="bubble">
      <div class="bubble-text">
        给我<span class="countdown" id="countdown">30</span>秒钟<br>让我醒过来哦~
      </div>
    </div>
    <img class="eggy-img" src="assets/pet/eggy_transparent_bg.webp"
         onerror="this.style.display='none'"
         alt="Eggy">
    <div class="loading-subtitle" id="pwaTip" style="display:none">
      点击右上角 "添加到主屏幕"<br>下次直接从桌面打开哦
    </div>
  </div>
  <script>
    // Countdown from 30 to 0
    var count = 30;
    var countdownEl = document.getElementById('countdown');
    var countdownTimer = setInterval(function() {
      count--;
      if (count >= 0) countdownEl.textContent = count;
      if (count <= 0) clearInterval(countdownTimer);
    }, 1000);

    // Only show PWA tip in browser mode (not installed PWA)
    if (!window.matchMedia('(display-mode: standalone)').matches &&
        !window.navigator.standalone) {
      var tip = document.getElementById('pwaTip');
      if (tip) tip.style.display = 'block';
    }
  </script>

  <script>
    // Remove loading screen once Flutter renders first frame
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });

    // Auto-update: when a new service worker is available, activate it immediately
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var reg of registrations) {
          reg.update();
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'activated') {
                  window.location.reload();
                }
              });
            }
          });
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
